name: E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'e2e/**'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run end-to-end scenario
        run: node --experimental-strip-types e2e/run.ts
